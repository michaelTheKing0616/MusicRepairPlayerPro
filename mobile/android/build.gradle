// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.25"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

// Register before rootproject plugin (evaluationDependsOn :app evaluates subprojects early).
gradle.beforeProject { project ->
    if (project == project.rootProject) {
        return
    }
    project.plugins.withId("com.android.library") {
        def androidExt = project.extensions.findByName("android")
        if (androidExt == null) {
            return
        }
        def currentNamespace = androidExt.hasProperty("namespace") ? androidExt.namespace : null
        if (currentNamespace == null || currentNamespace.toString().trim().isEmpty()) {
            def manifestFile = project.file("src/main/AndroidManifest.xml")
            if (manifestFile.exists()) {
                def parsedManifest = new XmlParser().parse(manifestFile)
                def packageName = parsedManifest.@package?.toString()
                if (packageName) {
                    androidExt.namespace = packageName
                }
            }
        }

        if (androidExt.hasProperty("compileSdkVersion")) {
            def rootCompileSdk = rootProject.ext.has("compileSdkVersion") ? rootProject.ext.compileSdkVersion : 35
            androidExt.compileSdkVersion rootCompileSdk
        }

        if (androidExt.hasProperty("buildFeatures")) {
            androidExt.buildFeatures {
                buildConfig true
            }
        }
    }
}

plugins {
    id("com.facebook.react.rootproject")
}

allprojects {
    repositories {
        flatDir {
            dirs "${rootDir}/libs"
        }
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/android")
        }
        maven {
            // Android JSC is installed from npm
            url(new File(["node", "--print", "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/dist")
        }
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }
}
