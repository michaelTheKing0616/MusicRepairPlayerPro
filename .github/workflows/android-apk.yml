name: Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install npm dependencies
        run: npm ci

      - name: Cache FFmpegKit Android AAR
        uses: actions/cache@v4
        with:
          path: mobile/android/libs/ffmpeg-kit-full-gpl.aar
          key: ffmpeg-kit-full-gpl-v1

      - name: Setup FFmpegKit Android binary
        run: bash scripts/setup-ffmpeg-kit-android.sh

      - name: Patch legacy React Native Android libraries
        run: node scripts/patch-rn-legacy-android.js

      - name: Patch ffmpeg-kit-react-native for local AAR
        run: node scripts/patch-ffmpeg-kit-android.js

      - name: Download on-device ML models
        run: bash scripts/download-ml-models.sh

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon -x lint --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Xmx4096m

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: musicrepair-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
